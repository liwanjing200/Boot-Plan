<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>炫酷动态页面 • Boot Plan Demo</title>
  <style>
    :root{
      --bg1:#0f1724;
      --bg2:#071126;
      --accent1: #7C4DFF;
      --accent2: #00E5FF;
      --glass: rgba(255,255,255,0.06);
      --glass-strong: rgba(255,255,255,0.08);
    }
    html,body{
      height:100%;
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", "Noto Sans", "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", Arial;
      -webkit-font-smoothing:antialiased;
      background: linear-gradient(120deg,var(--bg1),var(--bg2));
      overflow:hidden;
      color:#e6f0ff;
    }

    /* Canvas sits behind UI */
    #bg-canvas{
      position:fixed;
      inset:0;
      z-index:0;
      display:block;
    }

    /* Center card */
    .ui {
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none; /* let clicks pass to canvas by default unless on controls */
    }

    .card {
      width: min(920px, 92%);
      max-width: 1100px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:16px;
      padding:36px;
      box-shadow: 0 10px 40px rgba(2,6,23,0.6);
      display:flex;
      gap:28px;
      align-items:center;
      backdrop-filter: blur(6px) saturate(120%);
      pointer-events:auto;
    }

    .left {
      flex:1;
      min-width: 240px;
    }

    .neon-title {
      font-size: clamp(20px, 4.2vw, 44px);
      line-height:1.05;
      margin:0 0 12px 0;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 0 18px rgba(124,77,255,0.18),
        0 0 40px rgba(0,229,255,0.08),
        0 2px 0 rgba(0,0,0,0.35);
      letter-spacing: -0.02em;
      font-weight:700;
    }

    .subtitle {
      margin:0 0 18px 0;
      color: #cfe9ff;
      opacity:0.92;
      font-size: 14px;
    }

    .controls {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button {
      appearance:none;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      color:#e9f7ff;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(2,6,23,0.5);
      font-weight:600;
      font-size:13px;
      transition: transform .14s ease, box-shadow .14s ease;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(2,6,23,0.6); }
    .btn-accent {
      background: linear-gradient(90deg,var(--accent1),var(--accent2));
      color:#00121a;
      text-shadow:none;
      box-shadow: 0 10px 30px rgba(124,77,255,0.14), 0 2px 6px rgba(0,229,255,0.06);
    }

    .meta {
      font-size:13px;
      color:#bcdcff;
      opacity:0.9;
      margin-top:12px;
    }

    /* Right preview box */
    .preview {
      width:360px;
      min-width:240px;
      max-width:40%;
      height:220px;
      border-radius:12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      justify-content:center;
      align-items:center;
      box-shadow: inset 0 -10px 40px rgba(0,0,0,0.35);
    }

    .preview .big {
      font-weight:700;
      letter-spacing:-0.02em;
      font-size:22px;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      background: linear-gradient(90deg, rgba(255,255,255,0.95), rgba(255,255,255,0.8));
      text-shadow: 0 8px 36px rgba(0,0,0,0.6);
    }

    .hint {
      font-size:12px;
      color:#b7dafa;
      opacity:0.85;
    }

    footer.controls-note {
      margin-top:12px;
      font-size:12px;
      color:#9fbbe6;
      opacity:0.75;
    }

    .small {
      font-size:12px;
      color:#bcdcff;
    }

    /* small responsive */
    @media (max-width:860px){
      .card { flex-direction:column; align-items:stretch; padding:20px; gap:16px; }
      .preview { width:100%; height:160px; max-width:none; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <div class="ui">
    <div class="card" role="region" aria-label="炫酷演示卡片">
      <div class="left">
        <h1 class="neon-title">炫酷粒子 • 动态演示</h1>
        <p class="subtitle">鼠标移动影响粒子，点击切换吸/斥模式。也可以按空格键暂停动画。</p>

        <div class="controls" role="toolbar" aria-label="controls">
          <button id="toggle-mode" title="切换吸引 / 排斥">模式：吸引</button>
          <button id="color-scheme">颜色：霓虹</button>
          <button id="toggle-lines" class="btn-accent">连线：开</button>
        </div>

        <p class="meta">提示：移动鼠标摸索光带效果，点击画面切换吸/斥。页面适配移动端（触控即为鼠标位置）。</p>
        <p class="controls-note">按 Space 暂停/继续动画 • 按 R 重置粒子</p>
      </div>

      <div class="preview" aria-hidden="true">
        <div class="big">实时预览</div>
        <div class="hint">纯前端 • 无库 • 可扩展为 three.js</div>
      </div>
    </div>
  </div>

<script>
/*
  Dynamic particle background
  - Canvas 2D, additive blending for glow
  - Mouse attractor / repeller, click toggles mode
  - Lines drawn between nearby particles (toggleable)
  - Performance: particle count scales with viewport
*/

(() => {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d', { alpha: true });
  let w = 0, h = 0, dpr = Math.max(1, window.devicePixelRatio || 1);

  const state = {
    particles: [],
    maxParticles: 160,
    mouse: { x: null, y: null, down:false },
    mode: 'attract', // or 'repel'
    running: true,
    lines: true,
    colorScheme: 'neon' // or 'ice' or 'sunset'
  };

  // utility
  const rand = (a,b)=> Math.random()*(b-a)+a;
  const dist2 = (a,b)=> {
    const dx = a.x-b.x, dy = a.y-b.y; return dx*dx+dy*dy;
  };

  function resize(){
    w = innerWidth; h = innerHeight;
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    // scale particle count to viewport
    const area = w*h;
    state.maxParticles = Math.max(40, Math.min(260, Math.floor(area / 7000)));
    // keep or trim
    while (state.particles.length < state.maxParticles) state.particles.push(makeParticle());
    if (state.particles.length > state.maxParticles) state.particles.length = state.maxParticles;
  }

  window.addEventListener('resize', resize);

  function makeParticle(){
    return {
      x: rand(0,w),
      y: rand(0,h),
      vx: rand(-0.3,0.3),
      vy: rand(-0.3,0.3),
      size: rand(0.8,2.6),
      hue: rand(0,360),
      life: rand(60, 360)
    };
  }

  function resetParticles(){
    state.particles = [];
    for (let i=0;i<state.maxParticles;i++) state.particles.push(makeParticle());
  }

  // color schemes
  function particleColor(p){
    if (state.colorScheme === 'ice') {
      return `rgba(${200+Math.round(55*Math.random())}, ${230+Math.round(20*Math.random())}, 255, 0.9)`;
    } else if (state.colorScheme === 'sunset') {
      const g = 80 + Math.round(100*Math.random());
      return `rgba(${220+Math.round(35*Math.random())}, ${g}, ${50+Math.round(40*Math.random())}, 0.95)`;
    } else { // neon
      const base = 200 + Math.round(55*Math.sin(p.hue));
      const r = Math.round(120 + 120*Math.abs(Math.sin(p.hue)));
      const g = Math.round(50 + 200*Math.abs(Math.cos(p.hue)));
      const b = 255 - Math.round(30*Math.abs(Math.sin(p.hue)));
      return `rgba(${r},${g},${b},0.95)`;
    }
  }

  // draw loop
  let last = performance.now();
  function frame(now){
    const dt = Math.min(40, now - last) / 16.666;
    last = now;
    if (state.running) {
      update(dt);
      render();
    } else {
      // dimmed frame when paused
      render(true);
    }
    requestAnimationFrame(frame);
  }

  function update(dt){
    const particles = state.particles;
    const mx = state.mouse.x, my = state.mouse.y;
    for (let i=0;i<particles.length;i++){
      const p = particles[i];
      // natural drift
      p.vx += (Math.sin((p.x+p.y+performance.now()*0.0003)/80))*0.002 * dt;
      p.vy += (Math.cos((p.x-p.y+performance.now()*0.0004)/60))*0.002 * dt;

      // mouse interaction
      if (mx !== null && my !== null){
        let dx = mx - p.x, dy = my - p.y;
        let dist = Math.sqrt(dx*dx+dy*dy) + 0.001;
        let force = Math.max(0, 1 - dist / 200);
        if (state.mode === 'attract'){
          p.vx += (dx / dist) * 0.12 * force * dt;
          p.vy += (dy / dist) * 0.12 * force * dt;
        } else {
          p.vx -= (dx / dist) * 0.16 * force * dt;
          p.vy -= (dy / dist) * 0.16 * force * dt;
        }
      }

      // velocity damping
      p.vx *= 0.98;
      p.vy *= 0.98;

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // wrap around edges
      if (p.x < -10) p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      if (p.y < -10) p.y = h + 10;
      if (p.y > h + 10) p.y = -10;
    }
  }

  function render(dim=false){
    // clear with slight fading to produce trailing glow
    ctx.clearRect(0,0,w,h);
    // subtle background gradient overlay
    const g = ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0, 'rgba(10,14,28,0.18)');
    g.addColorStop(1, 'rgba(2,8,18,0.26)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);

    // particles glow
    ctx.globalCompositeOperation = 'lighter';
    const particles = state.particles;
    for (let i=0;i<particles.length;i++){
      const p = particles[i];
      const alpha = dim ? 0.25 : 1;
      const col = particleColor(p).replace(/[\d\.]+\)$/,'') + (dim ? ',0.18)' : ',0.95)');
      // soft outer glow
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*14);
      grd.addColorStop(0, col);
      grd.addColorStop(0.12, col.replace(/[\d\.]+\)$/,'') + ',0.35)');
      grd.addColorStop(0.45, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*12, 0, Math.PI*2);
      ctx.fill();
      // core dot
      ctx.fillStyle = particleColor(p);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }

    // lines between particles
    if (state.lines && !dim) {
      ctx.lineWidth = 0.9;
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      for (let i=0;i<particles.length;i++){
        for (let j=i+1;j<particles.length;j++){
          const a = particles[i], b = particles[j];
          const d2 = dist2(a,b);
          if (d2 < 12000) {
            const alpha = 0.6 * (1 - d2/12000);
            ctx.strokeStyle = `rgba(150,200,255,${(alpha*0.12).toFixed(3)})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  // mouse handling
  function pointerMove(e){
    const p = e.touches ? e.touches[0] : e;
    state.mouse.x = p.clientX;
    state.mouse.y = p.clientY;
  }
  function pointerLeave(){
    state.mouse.x = null;
    state.mouse.y = null;
  }
  function pointerDown(e){
    state.mouse.down = true;
    // flip mode on click
    state.mode = (state.mode === 'attract') ? 'repel' : 'attract';
    updateModeLabel();
  }
  function pointerUp(){ state.mouse.down = false; }

  // UI bindings
  const btnMode = document.getElementById('toggle-mode');
  const btnColor = document.getElementById('color-scheme');
  const btnLines = document.getElementById('toggle-lines');

  function updateModeLabel(){
    btnMode.textContent = `模式：${state.mode === 'attract' ? '吸引' : '排斥'}`;
  }
  function updateColorLabel(){
    btnColor.textContent = `颜色：${state.colorScheme === 'neon' ? '霓虹' : state.colorScheme === 'ice' ? '冰冷' : '夕阳'}`;
  }
  function updateLinesLabel(){
    btnLines.textContent = `连线：${state.lines ? '开' : '关'}`;
    btnLines.classList.toggle('btn-accent', state.lines);
  }

  btnMode.addEventListener('click', () => {
    state.mode = state.mode === 'attract' ? 'repel' : 'attract';
    updateModeLabel();
  });

  btnColor.addEventListener('click', () => {
    const order = ['neon','ice','sunset'];
    const idx = (order.indexOf(state.colorScheme) + 1) % order.length;
    state.colorScheme = order[idx];
    updateColorLabel();
  });

  btnLines.addEventListener('click', () => {
    state.lines = !state.lines;
    updateLinesLabel();
  });

  // keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      state.running = !state.running;
    } else if (e.key.toLowerCase() === 'r') {
      resetParticles();
    }
  });

  // pointer events (mouse & touch)
  window.addEventListener('mousemove', pointerMove);
  window.addEventListener('touchmove', pointerMove, { passive:true });
  window.addEventListener('mouseout', pointerLeave);
  window.addEventListener('touchend', pointerLeave);
  window.addEventListener('mousedown', pointerDown);
  window.addEventListener('mouseup', pointerUp);
  window.addEventListener('touchstart', (e) => { pointerMove(e); pointerDown(e); }, { passive:true });

  // initialize
  resize();
  resetParticles();
  updateModeLabel();
  updateColorLabel();
  updateLinesLabel();
  requestAnimationFrame(frame);

  // expose for debugging in console (optional)
  window._PARTICLE_BG = { state, resetParticles };

})();
</script>
</body>
</html>
